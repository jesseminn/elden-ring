<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>進度條風格挑選 · ELDEN RING</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #14110d; --panel: #1c1812; --panel2: #241d15;
        --border: #ffffff14; --border2: #ffffff22;
        --gold: #c9a14a; --gold-bright: #e8c874;
        --text: #e8e2d4; --muted: #9a8f7a; --muted2: #7d7461;
        --serif: Georgia, "Songti TC", "Noto Serif TC", serif;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--text);
        font-family: -apple-system, system-ui, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
        line-height: 1.55; -webkit-font-smoothing: antialiased; padding: 24px 14px 60px;
      }
      .wrap { max-width: 680px; margin: 0 auto; }
      h1 {
        font-family: "Cormorant Garamond", var(--serif); font-weight: 600;
        letter-spacing: .15em; text-transform: uppercase; font-size: 26px;
        background: linear-gradient(180deg, #f7e4b0, var(--gold-bright) 48%, #b5872f);
        -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        margin: 0 0 4px;
      }
      .intro { color: var(--muted); font-size: 13px; margin: 0 0 26px; }
      .intro b { color: var(--gold-bright); }
      .card {
        border: 1px solid var(--border); border-radius: 8px; background: var(--panel);
        padding: 16px 16px 18px; margin-bottom: 16px;
      }
      .card-h { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
      .card-n {
        font-family: var(--serif); font-weight: 700; font-size: 13px; color: #14110d;
        background: var(--gold); border-radius: 4px; padding: 1px 9px;
      }
      .card-t { font-family: var(--serif); font-weight: 700; color: var(--gold-bright); font-size: 15px; }
      .card-d { color: var(--muted2); font-size: 12px; }
      .demo { margin-top: 12px; }
      .demo + .demo { margin-top: 14px; }

      /* shared label row */
      .top { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 7px; }
      .label { font-family: var(--serif); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted2); }
      .count { font-size: 12.5px; color: var(--muted); white-space: nowrap; }
      .count b { font-family: var(--serif); color: var(--gold-bright); font-weight: 700; font-size: 16px; }
      .count .pct { color: var(--gold); font-weight: 700; margin-left: 8px; padding-left: 8px; border-left: 1px solid var(--border2); }

      /* ===== 1. 細線極簡 ===== */
      .s1-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
      .s1-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-bright)); }

      /* ===== 2. 膠囊 + 置中 overlay %（目前線上版） ===== */
      .s2-bar { position: relative; height: 20px; background: #00000040; border: 1px solid var(--border); border-radius: 999px; overflow: hidden; box-shadow: inset 0 1px 3px #00000073, 0 0 9px -3px #c9a14a66; }
      .s2-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--gold), var(--gold-bright)); }
      .s2-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 11.5px; font-weight: 700; color: var(--text); text-shadow: 0 1px 2px #000000b3; }

      /* ===== 3. 分段（XP / 魂系風） ===== */
      .s3-bar { display: flex; gap: 3px; height: 14px; }
      .s3-cell { flex: 1; border-radius: 2px; background: #00000055; border: 1px solid var(--border); }
      .s3-cell.on { background: linear-gradient(180deg, var(--gold-bright), var(--gold)); border-color: #c9a14a; box-shadow: 0 0 6px -2px var(--gold); }

      /* ===== 4. 內凹刻槽 + 高光 + 外暈 ===== */
      .s4-bar { position: relative; height: 16px; background: #0c0a07; border: 1px solid #000; border-radius: 4px; overflow: hidden; box-shadow: inset 0 2px 4px #000000cc, 0 0 12px -3px #c9a14a80; }
      .s4-fill { height: 100%; background: linear-gradient(180deg, #f3da9b 0%, var(--gold) 55%, #a07d33 100%); position: relative; }
      .s4-fill::after { content: ""; position: absolute; top: 1px; left: 2px; right: 2px; height: 2px; border-radius: 2px; background: #fff5d840; }

      /* ===== 5. 斜紋流動 ===== */
      .s5-bar { position: relative; height: 18px; background: #00000040; border: 1px solid var(--border); border-radius: 999px; overflow: hidden; box-shadow: inset 0 1px 3px #00000073; }
      .s5-fill {
        height: 100%; border-radius: 999px;
        background:
          repeating-linear-gradient(45deg, #ffffff1f 0 8px, #ffffff00 8px 16px),
          linear-gradient(90deg, var(--gold), var(--gold-bright));
        background-size: 22px 22px, 100% 100%;
        animation: s5move 0.9s linear infinite;
      }
      @keyframes s5move { from { background-position: 0 0, 0 0; } to { background-position: 22px 0, 0 0; } }
      .s5-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; font-family: var(--serif); font-size: 11px; font-weight: 700; color: var(--text); text-shadow: 0 1px 2px #000000b3; }

      /* ===== 6. 雕花外框面板 ===== */
      .s6-frame { border: 1px solid #c9a14a55; border-radius: 6px; padding: 4px; background: #00000033; box-shadow: 0 0 10px -3px #c9a14a4d; }
      .s6-bar { position: relative; height: 14px; background: #0c0a07; border-radius: 3px; overflow: hidden; }
      .s6-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-bright)); }
      .s6-cap { display: flex; align-items: baseline; justify-content: center; gap: 8px; margin-bottom: 7px; }
      .s6-cap .label { color: var(--gold-bright); }
      .s6-cap b { font-family: var(--serif); color: var(--gold-bright); font-weight: 700; font-size: 15px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>進度條風格挑選</h1>
      <p class="intro">
        以下都用本站真實配色與字體渲染，示意值 <b>146 / 519 · 28%</b>。
        選一個編號告訴 Claude，就只實作那一個（不再來回改）。
      </p>

      <!-- 1 -->
      <div class="card">
        <div class="card-h"><span class="card-n">1</span><span class="card-t">細線極簡</span><span class="card-d">最低調，一條細金線</span></div>
        <div class="demo">
          <div class="top"><span class="label">總進度</span><span class="count"><b>146</b> / 519<span class="pct">28%</span></span></div>
          <div class="s1-bar"><div class="s1-fill" style="width:28%"></div></div>
        </div>
      </div>

      <!-- 2 -->
      <div class="card">
        <div class="card-h"><span class="card-n">2</span><span class="card-t">膠囊 + 置中百分比</span><span class="card-d">目前線上版</span></div>
        <div class="demo">
          <div class="top"><span class="label">總進度</span><span class="count"><b>146</b> / 519</span></div>
          <div class="s2-bar"><div class="s2-fill" style="width:28%"></div><span class="s2-pct">28%</span></div>
        </div>
      </div>

      <!-- 3 -->
      <div class="card">
        <div class="card-h"><span class="card-n">3</span><span class="card-t">分段格（XP／魂系）</span><span class="card-d">切成格子，填滿發光</span></div>
        <div class="demo">
          <div class="top"><span class="label">總進度</span><span class="count"><b>146</b> / 519<span class="pct">28%</span></span></div>
          <div class="s3-bar" id="s3"></div>
        </div>
      </div>

      <!-- 4 -->
      <div class="card">
        <div class="card-h"><span class="card-n">4</span><span class="card-t">內凹刻槽 + 鎏金高光</span><span class="card-d">立體刻槽、金條有高光與外暈</span></div>
        <div class="demo">
          <div class="top"><span class="label">總進度</span><span class="count"><b>146</b> / 519<span class="pct">28%</span></span></div>
          <div class="s4-bar"><div class="s4-fill" style="width:28%"></div></div>
        </div>
      </div>

      <!-- 5 -->
      <div class="card">
        <div class="card-h"><span class="card-n">5</span><span class="card-t">斜紋流動</span><span class="card-d">金底加流動斜紋（動態）</span></div>
        <div class="demo">
          <div class="top"><span class="label">總進度</span><span class="count"><b>146</b> / 519</span></div>
          <div class="s5-bar"><div class="s5-fill" style="width:28%"></div><span class="s5-pct">28%</span></div>
        </div>
      </div>

      <!-- 6 -->
      <div class="card">
        <div class="card-h"><span class="card-n">6</span><span class="card-t">雕花外框面板</span><span class="card-d">金邊外框包住、標題置中</span></div>
        <div class="demo">
          <div class="s6-cap"><span class="label">總進度</span><b>146 / 519</b><span class="label">28%</span></div>
          <div class="s6-frame"><div class="s6-bar"><div class="s6-fill" style="width:28%"></div></div></div>
        </div>
      </div>
    </div>

    <script>
      // 分段格：20 格，依 28% 點亮
      var total = 20, on = Math.round(total * 0.28);
      var c = document.getElementById("s3");
      for (var i = 0; i < total; i++) {
        var d = document.createElement("div");
        d.className = "s3-cell" + (i < on ? " on" : "");
        c.appendChild(d);
      }
    </script>
  </body>
</html>

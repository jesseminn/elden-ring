name: Deploy to GitHub Pages

# 只在推送 semver tag（v*）時部署；平常推 main 不會觸發。
# 要更新線上站＝打一個版本 tag（例：git tag v1.1.0 && git push origin v1.1.0）。
# workflow_dispatch 保留為手動逃生口。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署，新的推送會取代進行中的
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # tag 觸發時注入 tag 名當版本；手動觸發（非 tag）則留空，build 退回 package.json
          VITE_APP_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
